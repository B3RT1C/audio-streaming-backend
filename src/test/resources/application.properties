# In-memory DB for unit/context tests (no external PostgreSQL required).
# Production/runtime still uses PostgreSQL via main application.properties.
spring.datasource.url=jdbc:h2:mem:musicstreaming;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Tests use H2 create-drop; skip Flyway and main data.sql.
spring.flyway.enabled=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
