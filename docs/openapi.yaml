openapi: 3.0.3
info:
  title: Audio Streaming API
  version: 0.1.0
  description: Shared contract for the central backend and future local mini-backends.

paths:
  /audios:
    get:
      summary: List track metadata
      responses:
        '200':
          description: Track list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Upload an audio file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                name:
                  type: string
                  description: Display name in the catalog (may repeat; defaults to file name without extension)
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '400':
          description: Missing file or invalid name/file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '500':
          $ref: '#/components/responses/InternalError'

  /audios/{id}:
    get:
      summary: Stream an audio file
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full audio stream
        '206':
          description: Partial content for range requests
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete a track
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Track deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /sync/status:
    get:
      summary: Sync status between central and local catalogs
      responses:
        '200':
          description: Pending downloads and uploads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatus'

components:
  responses:
    NotFound:
      description: Track or audio file not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            message: Audio track not found
            code: NOT_FOUND
    InternalError:
      description: Unexpected server or storage error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    ApiError:
      type: object
      required: [message, code]
      properties:
        message:
          type: string
          description: Human-readable English message
        code:
          type: string
          description: Stable machine code for clients
          enum:
            - FILE_REQUIRED
            - INVALID_NAME
            - INVALID_FILE
            - NOT_FOUND
            - STORAGE_ERROR
            - INTERNAL
    ApiMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
    Track:
      type: object
      required: [id, path, name, extension]
      properties:
        id:
          type: integer
        path:
          type: string
        name:
          type: string
          description: Display title; duplicates are allowed
        extension:
          type: string
        contentHash:
          type: string
          description: SHA-256 content hash (informational; duplicates allowed)
        checksum:
          type: string
          description: Reserved for future sync support
        updatedAt:
          type: string
          format: date-time
          description: Reserved for future sync support

    SyncStatus:
      type: object
      properties:
        pendingDownloads:
          type: array
          items:
            type: integer
        pendingUploads:
          type: array
          items:
            type: integer
